name: windows-release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  package:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content VERSION -Raw).Trim()
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.1
          include-templates: true
          use-dotnet: true

      - name: Restore NuGet packages
        run: dotnet restore "IFeelDumpQuiz.csproj"

      - name: Build C# project
        run: dotnet build "IFeelDumpQuiz.csproj" -c Release

      - name: Prepare export folders
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist/windows" | Out-Null
          New-Item -ItemType Directory -Force -Path "dist/release" | Out-Null

      - name: Export Windows build
        shell: pwsh
        run: |
          godot --headless --path . --import
          godot --headless --path . --export-release "Windows Desktop" "dist/windows/IFeelDumpQuiz.exe"

      - name: Verify export output
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/windows/IFeelDumpQuiz.exe")) {
            throw "Windows-Export wurde nicht erzeugt."
          }

      - name: Create release zip
        shell: pwsh
        run: |
          $zipPath = "dist/release/IFeelDumpQuiz-win64.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path "dist/windows/*" -DestinationPath $zipPath

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: IFeelDumpQuiz-win64
          path: dist/release/IFeelDumpQuiz-win64.zip

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/IFeelDumpQuiz-win64.zip
          name: IFeelDump Quiz v${{ steps.version.outputs.version }}
