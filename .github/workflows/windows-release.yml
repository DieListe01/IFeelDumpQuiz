name: windows-release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  package:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content VERSION -Raw).Trim()
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore NuGet packages
        run: dotnet restore "IFeelDumpQuiz.csproj"

      - name: Build C# project
        run: dotnet build "IFeelDumpQuiz.csproj" -c Release

      - name: Install wget
        shell: pwsh
        run: choco install wget -y

      - name: Export Windows build with Godot action
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot-builds/releases/download/4.6.1-stable/Godot_v4.6.1-stable_mono_win64.exe.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot-builds/releases/download/4.6.1-stable/Godot_v4.6.1-stable_export_templates.tpz
          relative_project_path: ./
          archive_output: false
          cache: true

      - name: Prepare release zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist/windows" | Out-Null
          New-Item -ItemType Directory -Force -Path "dist/release" | Out-Null

          $exportedExe = Get-ChildItem -Recurse . -Include "IFeelDumpQuiz.exe" |
            Where-Object { $_.FullName -notmatch "\\.git\\|\\bin\\|\\obj\\|\\.godot\\mono\\temp\\bin" } |
            Select-Object -First 1

          if ($null -eq $exportedExe) {
            Write-Host "Gefundene EXE/PCK-Dateien:"
            Get-ChildItem -Recurse . -Include *.exe,*.pck | Select-Object FullName
            throw "Kein exportiertes IFeelDumpQuiz.exe gefunden."
          }

          $exportDir = Split-Path $exportedExe.FullName -Parent
          Copy-Item -Path (Join-Path $exportDir '*') -Destination "dist/windows" -Recurse -Force

          $zipPath = "dist/release/IFeelDumpQuiz-win64.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path "dist/windows/*" -DestinationPath $zipPath

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: IFeelDumpQuiz-win64
          path: dist/release/IFeelDumpQuiz-win64.zip

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/IFeelDumpQuiz-win64.zip
          name: IFeelDump Quiz v${{ steps.version.outputs.version }}
