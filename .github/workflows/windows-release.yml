name: windows-release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  package:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content VERSION -Raw).Trim()
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.1
          include-templates: true
          use-dotnet: true

      - name: Restore NuGet packages
        run: dotnet restore "IFeelDumpQuiz.csproj"

      - name: Build C# project
        run: dotnet build "IFeelDumpQuiz.csproj" -c Release

      - name: Prepare export folders
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist/windows" | Out-Null
          New-Item -ItemType Directory -Force -Path "dist/release" | Out-Null

      - name: Export Windows build
        shell: pwsh
        run: |
          $godotPath = if ($env:GODOT) { $env:GODOT } elseif ($env:GODOT4) { $env:GODOT4 } else { "godot" }
          Write-Host "Nutze Godot: $godotPath"
          Write-Host "Export presets vorhanden: $(Test-Path 'export_presets.cfg')"
          if (Test-Path 'export_presets.cfg') { Get-Content 'export_presets.cfg' | Select-Object -First 40 }
          & $godotPath --version
          & $godotPath --headless --path "$PWD" --import --verbose 2>&1 | Tee-Object -FilePath godot-import.log
          & $godotPath --headless --path "$PWD" --build-solutions --verbose 2>&1 | Tee-Object -FilePath godot-build.log
          & $godotPath --headless --path "$PWD" --export-release "Windows Desktop" "$PWD/dist/windows/IFeelDumpQuiz.exe" --verbose 2>&1 | Tee-Object -FilePath godot-export.log

      - name: Debug export output
        if: always()
        shell: pwsh
        run: |
          Write-Host "Import log:"
          if (Test-Path "godot-import.log") { Get-Content "godot-import.log" }
          Write-Host "Build log:"
          if (Test-Path "godot-build.log") { Get-Content "godot-build.log" }
          Write-Host "Export log:"
          if (Test-Path "godot-export.log") { Get-Content "godot-export.log" }
          Write-Host "Inhalt dist/windows:"
          if (Test-Path "dist/windows") { Get-ChildItem -Recurse "dist/windows" | Select-Object FullName }
          Write-Host "Inhalt Projektwurzel (relevante EXE/PCK):"
          Get-ChildItem -Recurse . -Include *.exe,*.pck | Select-Object FullName

      - name: Normalize export output
        shell: pwsh
        run: |
          $target = "dist/windows/IFeelDumpQuiz.exe"
          if (Test-Path $target) { exit 0 }

          $candidates = Get-ChildItem -Recurse . -Include "IFeelDumpQuiz*.exe" |
            Where-Object { $_.FullName -notmatch "\\.git\\|\\bin\\|\\obj\\|\\.godot\\mono\\temp\\bin" }

          if ($candidates.Count -gt 0) {
            New-Item -ItemType Directory -Force -Path "dist/windows" | Out-Null
            Copy-Item $candidates[0].FullName $target -Force
          }

      - name: Verify export output
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/windows/IFeelDumpQuiz.exe")) {
            throw "Windows-Export wurde nicht erzeugt."
          }

      - name: Create release zip
        shell: pwsh
        run: |
          $zipPath = "dist/release/IFeelDumpQuiz-win64.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path "dist/windows/*" -DestinationPath $zipPath

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: IFeelDumpQuiz-win64
          path: dist/release/IFeelDumpQuiz-win64.zip

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/IFeelDumpQuiz-win64.zip
          name: IFeelDump Quiz v${{ steps.version.outputs.version }}
