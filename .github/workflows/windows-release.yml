name: windows-release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Read version
        id: version
        run: echo "version=$(tr -d '\r\n' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.1
          include-templates: true
          use-dotnet: true

      - name: Verify toolchain
        run: |
          godot --version
          dotnet --info

      - name: Restore NuGet packages
        run: dotnet restore IFeelDumpQuiz.csproj

      - name: Build C# project for Godot
        run: dotnet build IFeelDumpQuiz.csproj -c Debug

      - name: Prepare export folders
        run: |
          mkdir -p dist/windows
          mkdir -p dist/release

      - name: Prepare .NET runtime files
        run: |
          dotnet publish IFeelDumpQuiz.csproj -c Debug -o dist/publish

      - name: Import project
        run: godot --headless --path . --import --quit --verbose

      - name: Build Godot C# solutions
        run: godot --headless --path . --build-solutions --quit --verbose

      - name: Export Windows build
        run: godot --headless --path . --export-release "Windows Desktop" "dist/windows/IFeelDumpQuiz.exe" --quit --verbose

      - name: Verify export output
        run: |
          test -f dist/windows/IFeelDumpQuiz.exe
          test -f dist/windows/IFeelDumpQuiz.pck
          cp -r dist/publish/* dist/windows/
          cp VERSION dist/windows/VERSION
          ls -la dist/windows

      - name: Create release zip
        run: |
          cd dist/windows
          zip -r ../release/IFeelDumpQuiz-win64.zip .

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: IFeelDumpQuiz-win64
          path: dist/release/IFeelDumpQuiz-win64.zip

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/IFeelDumpQuiz-win64.zip
          name: IFeelDump Quiz v${{ steps.version.outputs.version }}
